<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Plan</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        svg {
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        text {
            font-size: 14px;
            fill: #333;
        }
        .dimension {
            font-size: 12px;
            fill: #666;
        }
    </style>
</head>
<body>
    <svg width="1000" height="750" viewBox="0 0 1000 750">
        <!-- Grid background -->
        <defs>
            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8e8e8" stroke-width="0.5"/>
            </pattern>
        </defs>
        <rect width="1000" height="750" fill="url(#grid)" />
        
        <!-- Outer walls -->
        <rect x="50" y="50" width="900" height="600" fill="none" stroke="black" stroke-width="3"/>
        
        <!-- Inner step (horizontal wall at 420px from top) -->
        <line x1="50" y1="420" x2="650" y2="420" stroke="black" stroke-width="3"/>
        
        <!-- Inner vertical divider -->
        <line x1="650" y1="420" x2="650" y2="650" stroke="black" stroke-width="3"/>
        
        <!-- Right side notch walls -->
        <line x1="650" y1="420" x2="750" y2="420" stroke="black" stroke-width="3"/>
        <line x1="750" y1="420" x2="750" y2="480" stroke="black" stroke-width="3"/>
        <line x1="750" y1="480" x2="820" y2="480" stroke="black" stroke-width="3"/>
        <line x1="820" y1="480" x2="820" y2="650" stroke="black" stroke-width="3"/>
        
        <!-- Left room wall (16' x 16') -->
        <line x1="50" y1="50" x2="350" y2="50" stroke="black" stroke-width="3"/>
        <line x1="350" y1="50" x2="350" y2="420" stroke="black" stroke-width="3"/>
        
        <!-- Door on back wall of left room (3' wide, 5' from left, 8' from right) -->
        <line x1="50" y1="420" x2="150" y2="420" stroke="black" stroke-width="3"/>
        <!-- Gap for door -->
        <line x1="200" y1="420" x2="350" y2="420" stroke="black" stroke-width="3"/>
        
        <!-- Closet wall (7' deep) -->
        <line x1="350" y1="420" x2="350" y2="560" stroke="black" stroke-width="3"/>
        
        <!-- Door on right wall of closet (3' wide, 12' from front) -->
        <line x1="350" y1="420" x2="350" y2="480" stroke="black" stroke-width="3"/>
        <!-- Gap for door -->
        <line x1="350" y1="530" x2="350" y2="560" stroke="black" stroke-width="3"/>
        
        <!-- Dimensions -->
        <text x="500" y="670" class="dimension">40'</text>
        <text x="30" y="350" class="dimension">30'</text>
        
        <!-- Room labels -->
        <text x="150" y="250" font-size="16" font-weight="bold">Bedroom 1</text>
        <text x="600" y="250" font-size="16" font-weight="bold">Living Area</text>
        <text x="700" y="550" font-size="14">Kitchen</text>
    </svg>
</body>
</html>
<html>
<head>
  <title>3D House</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>

// scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(60, 60, 60);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// lights
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(50,50,50);
scene.add(light);

// material
const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });

// helper
function wall(x, z, w, d, h=10) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x + w/2, h/2, z + d/2);
  scene.add(mesh);
}

// floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 30),
  new THREE.MeshStandardMaterial({ color: 0xdddddd })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// OUTER WALLS
wall(0,0,40,0.5);
wall(0,29.5,40,0.5);
wall(0,0,0.5,30);
wall(39.5,0,0.5,30);

// MASTER WALL (5 + gap + 8)
wall(0,14,5,0.5);
wall(8,14,8,0.5);

// CENTER WALL (12 + gap + 1)
wall(16,0,0.5,12);
wall(16,15,0.5,1);

// RIGHT WALL (1 from corner, gap, then 6)
wall(25,14,1,0.5);
wall(19,14,6,0.5);

// loop
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// resize
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
