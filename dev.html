<!DOCTYPE html>
<html>
<head>
  <title>3D Floor Plan</title>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(60, 60, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(50, 50, 50);
scene.add(light);

// material
const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

// helper to create walls
function wall(x, z, w, d, h=10) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, wallMat);
  mesh.position.set(x + w/2, h/2, z + d/2);
  scene.add(mesh);
}

// 🔲 FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 30),
  new THREE.MeshStandardMaterial({ color: 0xdddddd })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// 🔥 YOUR WALLS (based on your layout)

// OUTER WALLS
wall(0, 0, 40, 0.5);          // top
wall(0, 29.5, 40, 0.5);       // bottom
wall(0, 0, 0.5, 30);          // left
wall(39.5, 0, 0.5, 30);       // right

// LEFT MASTER TOP WALL (5' + 3' gap + 8')
wall(0, 14, 5, 0.5);
wall(8, 14, 8, 0.5);

// CENTER WALL (12 + 3 gap + 1)
wall(16, 0, 0.5, 12);
wall(16, 15, 0.5, 1);

// TOP RIGHT WALL (6 + 3 gap + 1 from corner)
wall(26 - 10, 14, 6, 0.5);  // 6' section
wall(25, 14, 1, 0.5);       // 1' near corner

// animate
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
