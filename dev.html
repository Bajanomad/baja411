<!DOCTYPE html>
<html>
<head>
  <title>3D Floor Plan</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(60, 60, 60);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// lighting (THIS WAS MISSING)
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(50, 50, 50);
scene.add(light);

// material
const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

// wall helper
function wall(x, z, w, d, h = 10) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, wallMat);
  mesh.position.set(x + w/2, h/2, z + d/2);
  scene.add(mesh);
}

// floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 30),
  new THREE.MeshStandardMaterial({ color: 0xdddddd })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// --- YOUR WALLS ---

// outer
wall(0, 0, 40, 0.5);
wall(0, 29.5, 40, 0.5);
wall(0, 0, 0.5, 30);
wall(39.5, 0, 0.5, 30);

// master wall (5 + gap + 8)
wall(0, 14, 5, 0.5);
wall(8, 14, 8, 0.5);

// center wall (12 + gap + 1)
wall(16, 0, 0.5, 12);
wall(16, 15, 0.5, 1);

// right wall (corner → 1 → gap → 6)
wall(25, 14, 1, 0.5);
wall(19, 14, 6, 0.5);

// render loop
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// resize fix
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
