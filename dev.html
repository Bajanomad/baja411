            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;

        h1 {

            font-size: 26px;

        }

        .contact-item {

            margin: 16px 0;
            text-decoration: none;
            font-weight: bold;
            color: #666;
            font-size: 17px;

        }
        .contact-item i {
            margin-right: 14px;
            font-size: 22px;
            color: #003DA5;
            transition: color 0.2s ease;
        }
        .contact-item:hover i {
            color: #E11B22;
        }
        @media (max-width: 500px) {
            .card {

            }
            .profile-pic {
                width: 70px;
                height: 70px;
                margin-top: -80px;
            }
            h1 {

            }
            .title {

            }
