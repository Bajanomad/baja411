<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Baja Nomad</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background-color: black;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #39ff14;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 600px;
    }

    .menu-button {
      background-color: black;
      border: 2px solid #39ff14;
      color: #39ff14;
      padding: 10px;
      text-align: center;
      text-decoration: none;
      font-size: 1rem;
      transition: all 0.3s ease;
      text-shadow: 0 0 5px #39ff14;
      border-radius: 5px;
    }

    .menu-button:hover {
      background-color: #39ff14;
      color: black;
      text-shadow: none;
      box-shadow: 0 0 10px #39ff14;
    }

    .menu-button img {
      width: 24px;
      height: 24px;
      vertical-align: middle;
      margin-right: 8px;
      filter: brightness(0) saturate(100%) invert(64%) sepia(99%) saturate(458%) hue-rotate(71deg) brightness(103%) contrast(95%);
    }

    .visitor-counter {
      margin-top: 40px;
      font-size: 1.2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>
  <h1>Welcome to The Baja Nomad</h1>

  <div class="button-grid">
    <a href="news.html" class="menu-button"><img src="icons/news.png" alt="">News</a>
    <a href="weather.html" class="menu-button"><img src="icons/weather.png" alt="">Weather</a>
    <a href="food.html" class="menu-button"><img src="icons/food.png" alt="">Food</a>
    <a href="guides.html" class="menu-button"><img src="icons/guide.png" alt="">Guides</a>
    <a href="maps.html" class="menu-button"><img src="icons/map.png" alt="">Maps</a>
    <a href="chat.html" class="menu-button"><img src="icons/chat.png" alt="">Chat</a>
  </div>

  <div class="visitor-counter" id="visitor-counter">1 Visitor</div>

  <script>
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(drawMatrix, 33);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
