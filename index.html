<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Baja Nomad</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html, body {
    height: 100%;
    background: black;
    font-family: 'Share Tech Mono', monospace;
    color: #39ff14;
    overflow-x: hidden;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    display: grid;
    grid-template-columns: repeat(2, 120px);
    grid-template-rows: repeat(4, 120px);
    gap: 30px 40px;
  }
  button {
    border: none;
    border-radius: 50%;
    background: #000;
    box-shadow: 0 0 15px #39ff14cc;
    cursor: pointer;
    width: 120px;
    height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: box-shadow 0.3s ease;
  }
  button:hover {
    box-shadow: 0 0 30px #39ff14;
  }
  button svg {
    width: 64px;
    height: 64px;
    fill: #39ff14;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- House icon linked to calendar -->
    <button onclick="window.open('https://calendar.google.com/calendar/embed?src=thebajanomad%40gmail.com&ctz=UTC', '_blank')" aria-label="House Sitting Calendar" title="House Sitting Calendar">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><path d="M32 12l18 18h-6v16h-8V38h-8v8h-8V30h-6z"/></svg>
    </button>

    <!-- Comments icon linked to review form -->
    <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScRioIJdZa-N53VBqu7lwsGQlPv_Mumufis3UEwq0-Oj7d1fg/viewform?usp=sharing&ouid=109031679840362745809', '_blank')" aria-label="Leave a Review" title="Leave a Review">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><path d="M32 6C18.75 6 8 14.79 8 25.5c0 6.18 3.9 11.62 9.7 14.22L16 54l11-8h5c13.25 0 24-8.79 24-19.5S45.25 6 32 6z"/></svg>
    </button>

    <!-- Weather icon linked to The Weather Channel -->
    <button onclick="window.open('https://weather.com/', '_blank')" aria-label="Weather" title="Weather">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><path d="M32 10a12 12 0 0 0 0 24 12 12 0 0 0 0-24zm0 36a16 16 0 0 0 0 32 16 16 0 0 0 0-32z"/></svg>
    </button>

    <!-- Hurricane icon linked to EDB Mike -->
    <button onclick="window.open('https://www.eebmike.com/', '_blank')" aria-label="Hurricane Tracking" title="Hurricane Tracking">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><path d="M32 2C15 2 2 15 2 32s13 30 30 30 30-13 30-30S49 2 32 2zm0 54c-13 0-24-11-24-24S19 8 32 8s24 11 24 24-11 24-24 24z"/></svg>
    </button>

    <!-- News icon linked to Gringo Gazette -->
    <button onclick="window.open('https://gringogazette.com/', '_blank')" aria-label="Local News" title="Local News">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><path d="M8 8h48v48H8z"/></svg>
    </button>

    <!-- Traffic icon placeholder -->
    <button aria-label="Local Traffic" title="Local Traffic" disabled style="cursor:not-allowed; opacity:0.4;">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><circle cx="32" cy="32" r="30"/></svg>
    </button>

    <!-- Facebook icon linked to personal Facebook -->
    <button onclick="window.open('https://www.facebook.com/yourpersonalprofile', '_blank')" aria-label="Facebook" title="Facebook">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="#39ff14"><path d="M22 12a10 10 0 1 0-11.5 9.87v-6.99h-2v-2.88h2v-2.2c0-2 1.18-3.1 2.98-3.1.86 0 1.76.16 1.76.16v1.95h-1c-.99 0-1.3.63-1.3 1.27v1.52h2.22l-.35 2.88h-1.87v6.99A10 10 0 0 0 22 12z"/></svg>
    </button>

    <!-- Email icon linked to mailto -->
    <button onclick="window.location.href='mailto:thebajanomad@gmail.com'" aria-label="Email" title="Email">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false"><path d="M2 16v32h60V16H2zm58 4-26 20-26-20h52z"/></svg>
    </button>
  </div>
</body>
</html>
