<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Ray Agnew | Digital Card</title>

  <!-- MATCHING FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow: hidden;
    }

    /* MATRIX CANVAS */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* CARD PANEL */
    .card {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 10vh auto;
      padding: 24px;
      background: rgba(0, 0, 0, 0.65);
      border: 2px solid #39ff14;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 18px #39ff14aa;
    }

    /* NAME */
    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #39ff14;
      font-size: 28px;
      margin-bottom: 12px;
      text-shadow: 0 0 12px #39ff14cc;
    }

    /* TITLES */
    .title {
      font-size: 16px;
      margin-bottom: 20px;
      color: #77ffda;
    }

    /* ICON GRID */
    .icon-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 10px;
    }

    /* INDIVIDUAL ICON WRAPPER */
    .icon {
      width: 70px;
      height: 70px;
      background: black;
      border: 3px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px #39ff14aa;
      transition: 0.2s;
    }

    /* ICON IMG */
    .icon img {
      width: 60%;
      height: 60%;
      object-fit: contain;
      pointer-events: none;
    }

    .icon:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px #39ff14;
      border-color: #2ecc40;
    }
  </style>
</head>

<body>

<!-- MATRIX BACKGROUND -->
<canvas id="matrixCanvas"></canvas>

<div class="card">

  <!-- SECRET HYPERLINK EASTER EGG -->
  <h1>
    <a href="[YOUR_SECRET_WEBPAGE]" style="color:#39ff14; text-decoration:none;">
      David Ray Agnew
    </a>
  </h1>

  <div class="title">
    Digital Operations &bull; Marketing Management
  </div>

  <!-- ICON ROWS (replace URLs & icons) -->
  <div class="icon-row">
    <a href="[PHONE_URL]" class="icon">
      <img src="https://img.icons8.com/ios-filled/100/39ff14/phone.png">
    </a>

    <a href="[WHATSAPP_URL]" class="icon">
      <img src="https://img.icons8.com/ios-filled/100/39ff14/whatsapp.png">
    </a>

    <a href="[EMAIL_URL]" class="icon">
      <img src="https://img.icons8.com/ios-filled/100/39ff14/new-post.png">
    </a>
  </div>

  <div class="icon-row">
    <a href="[INSTAGRAM_URL]" class="icon">
      <img src="https://img.icons8.com/ios-filled/100/39ff14/instagram-new.png">
    </a>

    <a href="[FACEBOOK_URL]" class="icon">
      <img src="https://img.icons8.com/ios-filled/100/39ff14/facebook-new.png">
    </a>

    <a href="[COMPANY_MAINPAGE_URL]" class="icon">
      <img src="https://img.icons8.com/ios-filled/100/39ff14/home.png">
    </a>
  </div>

</div>

<!-- MATRIX SCRIPT -->
<script>
  const canvas = document.getElementById("matrixCanvas");
  const ctx = canvas.getContext("2d");

  let width, height, columns, drops;
  const fontSize = 14;

  const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";

  function setup() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    columns = Math.floor(width / fontSize);
    drops = Array(columns).fill(1);
  }

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = "#39ff14";
    ctx.font = fontSize + "px 'Share Tech Mono'";

    for (let i = 0; i < drops.length; i++) {
      const char = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(char, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setup();
  setInterval(draw, 35);
  window.addEventListener("resize", setup);
</script>

</body>
</html>
