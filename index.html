<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Baja Nomad</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  * {
    box-sizing: border-box;
    margin: 0; padding: 0;
  }
  html, body {
    height: 100%;
    background: black;
    font-family: 'Share Tech Mono', monospace;
    color: #39ff14;
    overflow-x: hidden;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    padding: 2rem;
    background: rgba(0, 0, 0, 0.6);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    margin-bottom: 2rem;
    text-shadow: 0 0 8px #39ff14;
    text-align: center;
    width: 100%;
  }
  iframe {
    width: 90%;
    max-width: 900px;
    height: 600px;
    border: none;
    border-radius: 10px;
    margin-bottom: 2rem;
    box-shadow: 0 0 20px #39ff14aa;
  }
  .button-container {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 3rem;
    width: 90%;
    max-width: 900px;
  }
  .icon-button {
    background: #39ff14;
    border: none;
    border-radius: 20px;
    width: 120px;
    height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 5rem;
    cursor: pointer;
    box-shadow: 0 0 15px #39ff14cc;
    transition: background 0.3s ease;
    user-select: none;
  }
  .icon-button:hover {
    background: #2ecc40;
    box-shadow: 0 0 25px #2ecc40cc;
  }
</style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="content">
    <header>The Baja Nomad</header>
    <iframe src="https://calendar.google.com/calendar/embed?src=thebajanomad%40gmail.com&ctz=UTC" scrolling="no" aria-label="Calendar"></iframe>
    <div class="button-container">
      <button class="icon-button" onclick="window.open('#houseSitting', '_blank')" aria-label="House Sitting">🏠</button>
      <button class="icon-button" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScRioIJdZa-N53VBqu7lwsGQlPv_Mumufis3UEwq0-Oj7d1fg/viewform?usp=sharing', '_blank')" aria-label="Drop a Review">📝</button>
      <button class="icon-button" onclick="window.open('#readReviews', '_blank')" aria-label="Read Reviews">💬</button>
      <button class="icon-button" onclick="window.open('https://www.eebmike.com', '_blank')" aria-label="Hurricane Tracking">🌪️</button>
      <button class="icon-button" onclick="window.open('https://gringogazette.com', '_blank')" aria-label="Local News">📰</button>
      <button class="icon-button" onclick="window.open('https://www.ioverlander.com', '_blank')" aria-label="Campsites & Roads">🗺️</button>
      <button class="icon-button" onclick="window.open('mailto:thebajanomad@gmail.com')" aria-label="Email">✉️</button>
      <button class="icon-button" onclick="window.open('https://www.facebook.com/share/1DZrpqihNX/', '_blank')" aria-label="Facebook">📘</button>
    </div>
  </div>
<script>
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
  const fontSize = 14;
  const columns = Math.floor(canvas.width / fontSize);
  const drops = Array(columns).fill(1);

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#39ff14";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random() * letters.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  setInterval(draw, 35);

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
