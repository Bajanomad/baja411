<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Baja Nomad</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">

  <!-- Primary Meta -->
  <meta name="description" content="Baja news, weather, and hurricane tracking. Based in La Paz, BCS." />
  <meta name="keywords" content="Baja, weather, news, hurricane" />
  <meta name="author" content="The Baja Nomad" />

  <!-- Open Graph -->
  <meta property="og:title" content="The Baja Nomad" />
  <meta property="og:description" content="Baja news, weather, and hurricane tracking. Based in La Paz, BCS." />
  <meta property="og:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://the-baja-nomad.vercel.app" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Baja Nomad" />
  <meta name="twitter:description" content="Baja news, weather, and hurricane tracking." />
  <meta name="twitter:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      justify-items: center;
      align-items: center;
      margin-top: 2rem;
      width: 90vw;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .icon-btn {
      width: min(38vw, 160px);
      height: min(38vw, 160px);
    }

    /* Landscape — any device */
    @media (orientation: landscape) {
      .button-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 700px;
        gap: 1.5rem;
      }
      .icon-btn {
        width: min(18vw, 140px);
        height: min(18vw, 140px);
      }
      header {
        font-size: 1.8rem;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <div class="content">
    <header>The Baja Noma<a href="dev.html" style="all: unset; cursor: default;">d</a></header>

    <div class="button-grid">
      <button class="icon-btn" onclick="window.location.href='home.html'" title="House Sitting">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/home.png" alt="House Sitting" />
      </button>
      <button class="icon-btn" onclick="window.location.href='reviews.html'" title="Reviews">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/comments.png" alt="Reviews" />
      </button>
      <button class="icon-btn" onclick="window.location.href='weather.html'" title="Weather">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/partly-cloudy-day.png" alt="Weather" />
      </button>
      <button class="icon-btn" onclick="window.location.href='hurricane.html'" title="Hurricane">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/tornado.png" alt="Hurricane" />
      </button>
      <button class="icon-btn" onclick="window.location.href='news.html'" title="News">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/news.png" alt="News" />
      </button>
      <button class="icon-btn" onclick="window.location.href='map.html'" title="Traffic">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/car.png" alt="Traffic" />
      </button>
      <button class="icon-btn" onclick="window.open('https://www.facebook.com/profile.php?id=61581876812521','_blank')" title="Facebook">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/facebook-new.png" alt="Facebook" />
      </button>
      <button class="icon-btn" onclick="window.open('mailto:thebajanomad@gmail.com','_blank')" title="Email">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/new-post.png" alt="Email" />
      </button>
    </div>
  </div>

  <script src="matrix.js"></script>
</body>
</html>
