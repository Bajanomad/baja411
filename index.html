<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Baja Nomad</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">

  <!-- Open Graph for Social Sharing -->
  <meta property="og:title" content="The Baja Nomad" />
  <meta property="og:description" content="Welcome to the Baja Nomad, your one stop shop for local news and weather. You can also see my schedule if you would like ro book me for house sitting or gardening." />
  <meta property="og:image" content="social-preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com" />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem;
      min-height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    @keyframes neonFlicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      70% {
        text-shadow: none;
        opacity: 0.6;
      }
    }

    header {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 2rem;
      animation: neonFlicker 2.5s infinite alternate;
      text-align: center;
      white-space: nowrap;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2.5rem;
      justify-content: center;
      align-items: center;
      margin-top: 2rem;
      width: 90vw;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .icon-btn {
      width: 100%;
      max-width: 160px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: black;
      border: 3px solid #39ff14;
      box-shadow:
        0 0 8px #39ff14aa,
        0 0 15px #39ff14cc;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .icon-btn img {
      width: 60%;
      height: 60%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    @keyframes glitch {
      0% { transform: translate(0); filter: none; }
      20% { transform: translate(-2px, 2px); filter: drop-shadow(2px 0 #39ff14) drop-shadow(-2px 0 #2ecc40); }
      40% { transform: translate(2px, -2px); filter: drop-shadow(-2px 0 #39ff14) drop-shadow(2px 0 #2ecc40); }
      60% { transform: translate(-1px, 1px); filter: drop-shadow(1px 0 #2ecc40) drop-shadow(-1px 0 #39ff14); }
      80%, 100% { transform: translate(0); filter: none; }
    }

    .icon-btn:hover {
      animation: glitch 0.4s infinite;
      border-color: #2ecc40;
      box-shadow: 0 0 25px #2ecc40cc, 0 0 40px #2ecc40aa;
    }

    .icon-btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 10px #2ecc40aa, 0 0 20px #2ecc40aa;
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <div class="content">
    <header>The Baja Noma<a href="dev.html" style="all: unset; cursor: default;">d</a></header>

    <div class="button-grid">
      <button class="icon-btn" onclick="window.location.href='home.html'" title="House Sitting">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/home.png" alt="House Sitting" />
      </button>
      <button class="icon-btn" onclick="window.location.href='reviews.html'" title="Reviews">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/comments.png" alt="Reviews" />
      </button>
      <button class="icon-btn" onclick="window.location.href='weather.html'" title="Weather">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/partly-cloudy-day.png" alt="Weather" />
      </button>
      <button class="icon-btn" onclick="window.location.href='hurricane.html'" title="Hurricane">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/tornado.png" alt="Hurricane" />
      </button>
      <button class="icon-btn" onclick="window.location.href='news.html'" title="News">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/news.png" alt="News" />
      </button>
      <button class="icon-btn" onclick="window.location.href='map.html'" title="Traffic">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/car.png" alt="Traffic" />
      </button>
      <button class="icon-btn" onclick="window.open('https://www.facebook.com/share/17bqT4Zcs5/, '_blank')" title="Facebook">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/facebook-new.png" alt="Facebook" />
      </button>
      <button class="icon-btn" onclick="window.open('mailto:thebajanomad@gmail.com')" title="Email">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/new-post.png" alt="Email" />
      </button>
    </div>
  </div>
  
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const fontSize = 14;
    let drops = [];

    function setupCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    }

    setupCanvas();

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      setupCanvas();
    });
  </script>

  
</body>
</html>
