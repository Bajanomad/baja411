
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem;
      min-height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    header {
      font-size: 3rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 2rem;
      text-shadow: 0 0 8px #39ff14;
      text-align: center;
      width: 100%;
    }

    iframe {
      width: 90%;
      max-width: 900px;
      height: 600px;
      border: none;
      border-radius: 10px;
      margin-bottom: 2rem;
      box-shadow: 0 0 20px #39ff14aa;
    }

    .button-container {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .review-btn {
      background: #39ff14;
      color: #000;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      font-family: 'Orbitron', sans-serif;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 0 15px #39ff14cc;
      transition: background 0.3s ease;
    }

    .review-btn:hover {
      background: #2ecc40;
      box-shadow: 0 0 25px #2ecc40cc;
    }

    .useful-links {
      margin-top: 3rem;
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    .useful-links h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 6px #39ff14;
    }

    .useful-links ul {
      list-style: none;
      padding: 0;
    }

    .useful-links li {
      margin: 0.5rem 0;
      font-size: 1.1rem;
    }

    .useful-links a {
      color: #39ff14;
      text-decoration: none;
    }

    .useful-links a:hover {
      text-decoration: underline;
    }

    .contact-info {
      margin-top: 2rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="content">
    <header>The Baja Nomad</header>
    <iframe src="https://calendar.google.com/calendar/embed?src=your_calendar_link_here"></iframe>
    <div class="button-container">
      <button class="review-btn" onclick="window.open('https://your_review_form_link_here', '_blank')">Drop a Review</button>
      <button class="review-btn" onclick="window.open('https://your_public_reviews_link_here', '_blank')">Read Reviews</button>
    </div>

    <div class="useful-links">
      <h2>Useful Links for Baja Travelers</h2>
      <ul>
        <li>🗺 <a href="https://www.ioverlander.com" target="_blank">iOverlander - Campsites & Roads</a></li>
        <li>🌪 <a href="https://www.eebmike.com" target="_blank">EEB Mike - Hurricane Tracker</a></li>
        <li>📘 <a href="https://facebook.com/bajanomad" target="_blank">Baja Nomad Facebook Page</a></li>
        <li>📷 <a href="https://instagram.com/bajanomad" target="_blank">Follow on Instagram</a></li>
        <li>🎥 <a href="https://youtube.com/@bajanomad" target="_blank">Subscribe on YouTube</a></li>
      </ul>

      <div class="contact-info">
        📱 WhatsApp: +52 123 456 7890<br />
        ✉️ Email: bajanomad@example.com
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
