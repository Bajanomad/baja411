<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Baja Nomad</title>

  <!-- Google Fonts: Orbitron & Share Tech Mono -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <!-- =========================== STYLES =========================== -->
  <style>
    /* Basic reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Global page styling */
    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }

    /* Matrix canvas background */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Content wrapper */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem;
      min-height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    /* Header neon flicker animation */
    @keyframes neonFlicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      70% {
        text-shadow: none;
        opacity: 0.6;
      }
    }

    /* Page title */
    header {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 2rem;
      animation: neonFlicker 2.5s infinite alternate;
      text-align: center;
      white-space: nowrap;
    }

    /* Grid layout for buttons */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 120px);
      grid-gap: 2rem;
      justify-content: center;
      align-items: center;
      margin-top: 1rem;
    }

    /* Icon buttons */
    .icon-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: black;
      border: 4px solid #39ff14;
      box-shadow: 0 0 15px #39ff14cc, 0 0 30px #39ff14aa;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Icon images inside buttons */
    .icon-btn img {
      width: 60%;
      height: 60%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    /* Glitch hover animation */
    @keyframes glitch {
      0% { transform: translate(0); filter: none; }
      20% { transform: translate(-2px, 2px); filter: drop-shadow(2px 0 #39ff14) drop-shadow(-2px 0 #2ecc40); }
      40% { transform: translate(2px, -2px); filter: drop-shadow(-2px 0 #39ff14) drop-shadow(2px 0 #2ecc40); }
      60% { transform: translate(-1px, 1px); filter: drop-shadow(1px 0 #2ecc40) drop-shadow(-1px 0 #39ff14); }
      80%, 100% { transform: translate(0); filter: none; }
    }

    /* Hover effect on buttons */
    .icon-btn:hover {
      animation: glitch 0.4s infinite;
      border-color: #2ecc40;
      box-shadow: 0 0 25px #2ecc40cc, 0 0 40px #2ecc40aa;
      background: black;
    }
  </style>
</head>

<body>
  <!-- ========== MATRIX BACKGROUND ========== -->
  <canvas id="matrix"></canvas>

  <!-- ========== MAIN CONTENT AREA ========== -->
  <div class="content">
    <header>The Baja Nomad</header>

    <!-- ========== ICON BUTTON GRID ========== -->
    <div class="button-grid">

      <!-- 🏠 House Sitting (links to home.html) -->
      <button class="icon-btn" onclick="window.location.href='Home.html'" title="House Sitting">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/home.png" alt="House Sitting" />
      </button>

      <!-- 💬 Reviews (Google Form) -->
      <button class="icon-btn" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScRioIJdZa-N53VBqu7lwsGQlPv_Mumufis3UEwq0-Oj7d1fg/viewform?usp=sharing', '_blank')" title="Reviews">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/comments.png" alt="Reviews" />
      </button>

      <!-- ☁️ Weather (Weather.com) -->
      <button class="icon-btn" onclick="window.open('https://weather.com/weather/today/l/23.17,-109.7?par=google', '_blank')" title="Weather">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/partly-cloudy-day.png" alt="Weather" />
      </button>

      <!-- 🌪️ Hurricane (eebmike) -->
      <button class="icon-btn" onclick="window.open('https://www.eebmike.com', '_blank')" title="Hurricane">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/tornado.png" alt="Hurricane" />
      </button>

      <!-- 📰 News (Gringo Gazette) -->
      <button class="icon-btn" onclick="window.open('https://www.gringogazette.com', '_blank')" title="News">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/news.png" alt="News" />
      </button>

      <!-- 🚗 Traffic (iOverlander) -->
      <button class="icon-btn" onclick="window.open('https://www.ioverlander.com', '_blank')" title="Traffic">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/car.png" alt="Traffic" />
      </button>

      <!-- 📘 Facebook Share -->
      <button class="icon-btn" onclick="window.open('https://www.facebook.com/share/1DZrpqihNX/', '_blank')" title="Facebook">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/facebook-new.png" alt="Facebook" />
      </button>

      <!-- 📧 Email Link -->
      <button class="icon-btn" onclick="window.open('mailto:thebajanomad@gmail.com')" title="Email">
        <img src="https://img.icons8.com/ios-filled/100/39ff14/new-post.png" alt="Email" />
      </button>
    </div>
  </div>

  <!-- ========== MATRIX JAVASCRIPT ========== -->
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // Set canvas size
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    // Matrix characters
    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    // Resize canvas when window size changes
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
