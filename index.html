<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }html, body {
  height: 100%;
  background: black;
  font-family: 'Share Tech Mono', monospace;
  color: #39ff14;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem;
  min-height: 100%;
  background: rgba(0, 0, 0, 0.6);
}

header {
  font-size: 3rem;
  font-family: 'Orbitron', sans-serif;
  margin-bottom: 2rem;
  text-shadow: 0 0 8px #39ff14;
  text-align: center;
  width: 100%;
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(2, 120px);
  gap: 1.5rem;
  justify-content: center;
  align-items: center;
}

.icon-button {
  width: 120px;
  height: 120px;
  background: #39ff14;
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  color: black;
  box-shadow: 0 0 15px #39ff14cc;
  transition: transform 0.2s, box-shadow 0.3s ease;
  cursor: pointer;
}

.icon-button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #2ecc40cc;
}

  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="content">
    <header>The Baja Nomad</header>
    <div class="button-grid">
      <button class="icon-button" onclick="window.open('https://calendar.google.com/calendar/embed?src=thebajanomad%40gmail.com&ctz=UTC', '_blank')">🏠</button>
      <button class="icon-button" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScRioIJdZa-N53VBqu7lwsGQlPv_Mumufis3UEwq0-Oj7d1fg/viewform?usp=sharing', '_blank')">💬</button>
      <button class="icon-button" onclick="window.open('https://weather.com/weather/today', '_blank')">🌦️</button>
      <button class="icon-button" onclick="window.open('https://www.eebmike.com', '_blank')">🌪️</button>
      <button class="icon-button" onclick="window.open('https://www.gringogazette.com', '_blank')">📰</button>
      <button class="icon-button" onclick="window.open('https://www.google.com/maps', '_blank')">🚗</button>
      <button class="icon-button" onclick="window.open('https://www.facebook.com/share/1DZrpqihNX/', '_blank')">📘</button>
      <button class="icon-button" onclick="window.open('mailto:thebajanomad@gmail.com', '_blank')">📧</button>
    </div>
  </div>  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script></body>
</html>
