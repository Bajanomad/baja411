<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }html, body {
  height: 100%;
  background: black;
  font-family: 'Share Tech Mono', monospace;
  color: #39ff14;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem;
  min-height: 100%;
  background: rgba(0, 0, 0, 0.6);
}

header {
  font-size: 2.5rem;
  font-family: 'Orbitron', sans-serif;
  margin-bottom: 2rem;
  text-shadow: 0 0 8px #39ff14;
  text-align: center;
  white-space: nowrap;
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(2, 120px);
  grid-gap: 1.5rem;
  justify-content: center;
  align-items: center;
  margin-top: 1rem;
}

.icon-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #39ff14;
  border: none;
  box-shadow: 0 0 15px #39ff14cc;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: background 0.3s ease;
}

.icon-btn img {
  width: 50%;
  height: 50%;
  object-fit: contain;
}

.icon-btn:hover {
  background: #2ecc40;
  box-shadow: 0 0 25px #2ecc40cc;
}

  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="content">
    <header>The Baja Nomad</header>
    <div class="button-grid">
      <button class="icon-btn" onclick="window.open('https://calendar.google.com/calendar/embed?src=thebajanomad%40gmail.com&ctz=UTC', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/home.png" alt="House Sitting">
      </button>
      <button class="icon-btn" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScRioIJdZa-N53VBqu7lwsGQlPv_Mumufis3UEwq0-Oj7d1fg/viewform?usp=sharing', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/topic.png" alt="Reviews">
      </button>
      <button class="icon-btn" onclick="window.open('https://weather.com/weather/today/l/23.17,-109.7?par=google', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/partly-cloudy-day.png" alt="Weather">
      </button>
      <button class="icon-btn" onclick="window.open('https://www.eebmike.com', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/hurricane.png" alt="Hurricane">
      </button>
      <button class="icon-btn" onclick="window.open('https://www.gringogazette.com', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/news.png" alt="News">
      </button>
      <button class="icon-btn" onclick="window.open('https://www.ioverlander.com', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/car.png" alt="Traffic">
      </button>
      <button class="icon-btn" onclick="window.open('https://www.facebook.com/share/1DZrpqihNX/', '_blank')">
        <img src="https://img.icons8.com/ios-filled/100/000000/facebook-new.png" alt="Facebook">
      </button>
      <button class="icon-btn" onclick="window.open('mailto:thebajanomad@gmail.com')">
        <img src="https://img.icons8.com/ios-filled/100/000000/new-post.png" alt="Email">
      </button>
    </div>
  </div>  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script></body>
</html>
