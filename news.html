<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todos Santos Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&family=Jura&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.7);
      min-height: 100vh;
    }
    header {
      font-size: 2rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px #39ff14;
      text-align: center;
    }

    /* --- BACK BUTTON --- */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px #39ff14aa;
      transition: all 0.3s ease;
      cursor: pointer;
      z-index: 2;
    }
    .back-btn:hover {
      background-color: #2ecc40;
      border-color: #2ecc40;
      box-shadow: 0 0 20px #2ecc40cc;
    }
    .back-btn svg {
      fill: #39ff14;
      width: 20px;
      height: 20px;
    }
    .back-btn:hover svg {
      fill: black;
    }

    /* --- WIDGET SECTION --- */
    .widget-container {
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 900px;
    }

    iframe {
      border: none;
      width: 100%;
      height: 500px;
    }
  </style>
</head>
<body>
  <!-- 🌧️ MATRIX RAIN BACKGROUND -->
  <canvas id="matrix"></canvas>

  <!-- 🔙 BACK BUTTON -->
  <a class="back-btn" href="https://the-baja-nomad.vercel.app" title="Back to Home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6" stroke="none" stroke-width="2" fill="currentColor"/>
    </svg>
  </a>

  <!-- 🧠 MAIN CONTENT -->
  <div class="content">
    <header>Todos Santos Weather</header>

    <div class="widget-container">

      <!-- 🌤️ FORECAST WIDGET (WeatherWidget.io) -->
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/23d45n110d23/todos-santos/?unit=us"
         data-label_1="TODOS SANTOS"
         data-label_2="WEATHER"
         data-font="Jura"
         data-theme="dark"
         data-textcolor="#90ff46">
        TODOS SANTOS WEATHER
      </a>

      <!-- 🛰️ WINDY RADAR MAP -->
      <iframe
        src="https://embed.windy.com/embed2.html?lat=23.45&lon=-110.23&detailLat=23.45&detailLon=-110.23&width=100%&height=500&zoom=10&level=surface&overlay=rain&menu=&message=&marker=true&calendar=&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default"
        title="Windy Weather Radar">
      </iframe>

    </div>
  </div>

  <!-- 🧪 MATRIX SCRIPT -->
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 35);
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

  <!-- ⚙️ WEATHER WIDGET SCRIPT -->
  <script>
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s); js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>
</body>
</html>
