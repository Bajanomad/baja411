<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News - The Baja Nomad</title>

  <!-- Primary Meta -->
  <meta name="description" content="Local news for Baja California Sur from the Gringo Gazette, Cabo Sun, and La Paz Times." />
  <meta name="keywords" content="Baja, news, La Paz, Cabo" />
  <meta name="author" content="The Baja Nomad" />

  <!-- Open Graph -->
  <meta property="og:title" content="News - The Baja Nomad" />
  <meta property="og:description" content="Local news for Baja California Sur from the Gringo Gazette, Cabo Sun, and La Paz Times." />
  <meta property="og:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://the-baja-nomad.vercel.app/news.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="News - The Baja Nomad" />
  <meta name="twitter:description" content="Local news for Baja California Sur from the Gringo Gazette, Cabo Sun, and La Paz Times." />
  <meta name="twitter:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />

  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .content {
      overflow-y: auto;
      width: 100vw;
      height: 100vh;
    }

    .feed {
      margin-bottom: 2.5rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      box-shadow: 0 0 6px #2ecc4080;
      width: 100%;
      max-width: 800px;
    }

    .feed h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid #39ff14;
      padding-bottom: 0.25rem;
    }

    .articles {
      list-style: none;
      max-height: 300px;
      overflow-y: auto;
      padding: 0 0.5rem;
    }

    .articles li {
      margin-bottom: 1rem;
      border-bottom: 1px dotted #2ecc40;
      padding-bottom: 0.5rem;
    }

    .articles li a {
      color: #90ff46;
      font-weight: bold;
      text-decoration: none;
      font-size: 1rem;
    }

    .articles li a:hover {
      text-decoration: underline;
      color: #2ecc40;
    }

    .articles li .pubDate {
      font-size: 0.8rem;
      color: #2ecc40aa;
    }

    @media (orientation: landscape) {
      header { font-size: 1.8rem; margin-bottom: 1rem; }
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back to Main" />
  </a>

  <div class="content">
    <header>Local News</header>
    <div id="news-container"></div>
  </div>

  <script src="matrix.js"></script>

  <script>
    const feeds = [
      {
        name: "The Cabo Sun",
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fthecabosun.com%2Ffeed"
      },
      {
        name: "Gringo Gazette",
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.gringogazette.com%2Ffeed"
      },
      {
        name: "La Paz Times",
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Flapaztimes.com%2Ffeed%3Flang%3Den"
      }
    ];

    const container = document.getElementById('news-container');

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    feeds.forEach(feed => {
      fetch(feed.url)
        .then(response => response.json())
        .then(data => {
          if (!data || !data.items || !data.items.length) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'feed';
            errorDiv.innerHTML = `<h2>${feed.name}</h2><p style="color:#f00;">No articles found or feed blocked.</p>`;
            container.appendChild(errorDiv);
            return;
          }

          const feedDiv = document.createElement('div');
          feedDiv.className = 'feed';

          const title = document.createElement('h2');
          title.textContent = feed.name;
          feedDiv.appendChild(title);

          const list = document.createElement('ul');
          list.className = 'articles';

          data.items.slice(0, 8).forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = item.link;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = item.title;
            li.appendChild(a);

            const dateSpan = document.createElement('div');
            dateSpan.className = 'pubDate';
            dateSpan.textContent = formatDate(item.pubDate);
            li.appendChild(dateSpan);

            list.appendChild(li);
          });

          feedDiv.appendChild(list);
          container.appendChild(feedDiv);
        })
        .catch(err => {
          console.error(`Failed to load ${feed.name} feed:`, err);
          const errorDiv = document.createElement('div');
          errorDiv.className = 'feed';
          errorDiv.innerHTML = `<h2>${feed.name}</h2><p style="color:#f00;">Failed to load feed.</p>`;
          container.appendChild(errorDiv);
        });
    });
  </script>
</body>
</html>
