<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local News - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow: hidden;
      position: relative;
      padding: 0;
    }

    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      transform: translateZ(0);
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.95);
      padding: 2rem;
      overflow-y: auto;
    }

    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 3s infinite alternate;
      user-select: none;
    }

    @keyframes flicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      75% {
        text-shadow: none;
        opacity: 0.6;
      }
    }

    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      box-shadow: 0 0 8px #39ff14aa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      text-decoration: none;
    }

    .back-arrow:hover {
      transform: scale(1.1);
      border-color: #2ecc40;
      box-shadow: 0 0 16px #2ecc40cc;
    }

    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
      user-select: none;
      pointer-events: none;
    }

    .feed {
      margin-bottom: 2.5rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      box-shadow: 0 0 6px #2ecc4080;
    }

    .feed h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid #39ff14;
      padding-bottom: 0.25rem;
      user-select: none;
    }

    .articles {
      list-style: none;
      max-height: 300px;
      overflow-y: auto;
      padding: 0 0.5rem;
    }

    .articles li {
      margin-bottom: 1rem;
      border-bottom: 1px dotted #2ecc40;
      padding-bottom: 0.5rem;
    }

    .articles li a {
      color: #90ff46;
      font-weight: bold;
      text-decoration: none;
      font-size: 1rem;
      user-select: text;
    }

    .articles li a:hover {
      text-decoration: underline;
      color: #2ecc40;
    }

    .articles li .pubDate {
      font-size: 0.8rem;
      color: #2ecc40aa;
      user-select: text;
    }
  </style>
</head>
<body>

  <canvas id="matrix"></canvas>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Local News</header>
    <div id="news-container"></div>
  </div>

  <script>
    // Matrix background
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    let columns = Math.floor(canvas.width / fontSize);
    let drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 35);

    // News feeds - Baja Insider removed
    const feeds = [
      {
        name: "Gringo Gazette",
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.gringogazette.com%2Ffeed"
      },
      {
        name: "The Cabo Sun",
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fthecabosun.com%2Ffeed"
      },
      {
        name: "La Paz Times",
        url: "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Flapaztimes.com%2Ffeed"
      }
    ];

    const container = document.getElementById('news-container');

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    feeds.forEach(feed => {
      fetch(feed.url)
        .then(response => response.json())
        .then(data => {
          if (!data || !data.items || !data.items.length) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'feed';
            errorDiv.innerHTML = `<h2>${feed.name}</h2><p style="color:#f00;">No articles found or feed blocked.</p>`;
            container.appendChild(errorDiv);
            return;
          }

          const feedDiv = document.createElement('div');
          feedDiv.className = 'feed';

          const title = document.createElement('h2');
          title.textContent = feed.name;
          feedDiv.appendChild(title);

          const list = document.createElement('ul');
          list.className = 'articles';

          data.items.slice(0, 8).forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = item.link;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = item.title;
            li.appendChild(a);

            const dateSpan = document.createElement('div');
            dateSpan.className = 'pubDate';
            dateSpan.textContent = formatDate(item.pubDate);
            li.appendChild(dateSpan);

            list.appendChild(li);
          });

          feedDiv.appendChild(list);
          container.appendChild(feedDiv);
        })
        .catch(err => {
          console.error(`Failed to load ${feed.name} feed:`, err);
          const errorDiv = document.createElement('div');
          errorDiv.className = 'feed';
          errorDiv.innerHTML = `<h2>${feed.name}</h2><p style="color:#f00;">Failed to load feed.</p>`;
          container.appendChild(errorDiv);
        });
    });
  </script>

</body>
</html>
