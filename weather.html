<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    html, body {
      height: 100%;
      background: black;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 2.5s infinite alternate;
    }
    @keyframes flicker {
      0%,100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }
    .back-arrow {
      position: fixed;
      top: 20px; left: 20px;
      width: 40px; height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      cursor: pointer;
      text-decoration: none;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px #2ecc40cc;
      border-color: #2ecc40;
    }
    .back-arrow img {
      width: 20px; height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }
    .weather-container {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      max-width: 980px;
      width: 100%;
    }
    .weather-card {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #39ff14;
      border-radius: 12px;
      box-shadow: 0 0 15px #39ff14aa;
      padding: 1rem 2rem;
      width: 280px;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      text-align: center;
    }
    .weather-card h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      text-shadow: 0 0 6px #39ff14;
    }
    .weather-info {
      font-size: 1rem;
      margin-top: 0.5rem;
      text-transform: capitalize;
    }
    .temp {
      font-size: 2rem;
      font-weight: bold;
      margin: 0.5rem 0;
    }
    .icon {
      width: 60px;
      height: 60px;
    }
    .error {
      color: #ff3300;
      font-weight: bold;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <header>Weather - The Baja Nomad</header>

  <div class="weather-container" id="weather-container">
    <!-- Weather cards injected here -->
  </div>

  <script>
    const API_KEY = '02ad3935f8620de31849a9e252740489';

    const cities = [
      { name: "La Paz", lat: 24.1426, lon: -110.3128 },
      { name: "Los Cabos", lat: 22.8905, lon: -109.9167 },
      { name: "Todos Santos", lat: 23.4453, lon: -110.2656 }
    ];

    const container = document.getElementById('weather-container');

    function kelvinToCelsius(k) {
      return (k - 273.15).toFixed(1);
    }
    function kelvinToFahrenheit(k) {
      return ((k - 273.15) * 9/5 + 32).toFixed(1);
    }

    async function fetchWeather(city) {
      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?lat=${city.lat}&lon=${city.lon}&appid=${API_KEY}`
        );
        if(!res.ok) throw new Error('Network response not ok');
        const data = await res.json();
        return data;
      } catch (e) {
        return { error: true, message: e.message };
      }
    }

    function createWeatherCard(city, data) {
      if(data.error) {
        return `
          <div class="weather-card">
            <h2>${city.name}</h2>
            <p class="error">Failed to load weather: ${data.message}</p>
          </div>
        `;
      }

      const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

      return `
        <div class="weather-card">
          <h2>${city.name}</h2>
          <img class="icon" src="${iconUrl}" alt="${data.weather[0].description}" />
          <div class="temp">${kelvinToCelsius(data.main.temp)}°C / ${kelvinToFahrenheit(data.main.temp)}°F</div>
          <div class="weather-info">${data.weather[0].description}</div>
          <div class="weather-info">Humidity: ${data.main.humidity}%</div>
          <div class="weather-info">Wind: ${data.wind.speed} m/s</div>
        </div>
      `;
    }

    async function loadWeather() {
      container.innerHTML = '<p>Loading weather data...</p>';
      let cardsHTML = '';
      for(const city of cities) {
        const data = await fetchWeather(city);
        cardsHTML += createWeatherCard(city, data);
      }
      container.innerHTML = cardsHTML;
    }

    loadWeather();
  </script>

</body>
</html>
