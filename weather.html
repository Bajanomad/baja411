<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    html, body {
      height: 100%;
      background: black;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 2.5s infinite alternate;
    }
    @keyframes flicker {
      0%,100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }
    .back-arrow {
      position: fixed;
      top: 20px; left: 20px;
      width: 40px; height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      cursor: pointer;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px #2ecc40cc;
      border-color: #2ecc40;
    }
    .back-arrow img {
      width: 20px; height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }
    .widgets-container {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      max-width: 980px;
      width: 100%;
    }
    .widget {
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #39ff14;
      border-radius: 12px;
      box-shadow: 0 0 15px #39ff14aa;
      padding: 1rem;
      width: 320px;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
    }
    .widget h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 6px #39ff14;
    }
    /* WeatherWidget.io widget overrides */
    .weatherwidget-io {
      width: 100% !important;
      border-radius: 8px !important;
    }
  </style>
</head>
<body>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <header>Weather - The Baja Nomad</header>

  <div class="widgets-container">

    <div class="widget">
      <h2>La Paz</h2>
      <a class="weatherwidget-io" href="https://forecast7.com/en/24d1431d72/la-paz/" data-label_1="LA PAZ" data-label_2="WEATHER" data-theme="dark" >La Paz Weather</a>
    </div>

    <div class="widget">
      <h2>Los Cabos</h2>
      <a class="weatherwidget-io" href="https://forecast7.com/en/22d8906d91/los-cabos/" data-label_1="LOS CABOS" data-label_2="WEATHER" data-theme="dark" >Los Cabos Weather</a>
    </div>

    <div class="widget">
      <h2>Todos Santos</h2>
      <a class="weatherwidget-io" href="https://forecast7.com/en/23d4529d26/todos-santos/" data-label_1="TODOS SANTOS" data-label_2="WEATHER" data-theme="dark" >Todos Santos Weather</a>
    </div>

  </div>

  <script>
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>

</body>
</html>
