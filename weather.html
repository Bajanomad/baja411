<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todos Santos Weather - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ===== GLOBAL STYLES ===== */
    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    html, body {
      height: 100%;
      background: black;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ===== MATRIX BACKGROUND CANVAS ===== */
    canvas#matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== MAIN CONTENT CONTAINER ===== */
    .content {
      position: relative;
      z-index: 1;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== PAGE HEADER ===== */
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 2.5s infinite alternate;
    }
    @keyframes flicker {
      0%,100% { text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc; opacity: 1; }
      50% { text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa; opacity: 0.8; }
      70% { text-shadow: none; opacity: 0.6; }
    }

    /* ===== BACK ARROW BUTTON ===== */
    .back-arrow {
      position: fixed;
      top: 20px; left: 20px;
      width: 40px; height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      cursor: pointer;
      text-decoration: none;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px #2ecc40cc;
      border-color: #2ecc40;
    }
    .back-arrow img {
      width: 20px; height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }

    /* ===== WEATHER CARD ===== */
    .weather-card {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #39ff14;
      border-radius: 12px;
      box-shadow: 0 0 15px #39ff14aa;
      padding: 2rem 3rem;
      max-width: 400px;
      width: 100%;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      text-align: center;
    }
    .weather-card h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 6px #39ff14;
    }
    .weather-info {
      font-size: 1.2rem;
      margin-top: 0.75rem;
      text-transform: capitalize;
    }
    .temp {
      font-size: 3rem;
      font-weight: bold;
      margin: 1rem 0;
    }
    .icon {
      width: 100px;
      height: 100px;
    }
    .error {
      color: #ff3300;
      font-weight: bold;
      margin-top: 2rem;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <!-- MATRIX RAIN -->
  <canvas id="matrix"></canvas>

  <!-- BACK ARROW -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <!-- PAGE CONTENT -->
  <div class="content">
    <header>Todos Santos Weather - The Baja Nomad</header>

    <div id="weather-container" class="weather-card">
      <!-- Weather info injected here -->
      <p>Loading weather data...</p>
    </div>
  </div>

  <script>
    /* MATRIX RAIN EFFECT */
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    /* WEATHER FETCH & DISPLAY FOR TODOS SANTOS */
    const API_KEY = '02ad3935f8620de31849a9e252740489';
    const city = { name: "Todos Santos", lat: 23.4453, lon: -110.2656 };
    const container = document.getElementById('weather-container');

    function kelvinToCelsius(k) {
      return (k - 273.15).toFixed(1);
    }
    function kelvinToFahrenheit(k) {
      return ((k - 273.15) * 9/5 + 32).toFixed(1);
    }

    async function fetchWeather() {
      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?lat=${city.lat}&lon=${city.lon}&appid=${API_KEY}`
        );
        if(!res.ok) throw new Error('Network response not ok');
        const data = await res.json();
        return data;
      } catch (e) {
        return { error: true, message: e.message };
      }
    }

    function displayWeather(data) {
      if(data.error) {
        container.innerHTML = `<p class="error">Failed to load weather: ${data.message}</p>`;
        return;
      }

      const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

      container.innerHTML = `
        <h2>${city.name}</h2>
        <img class="icon" src="${iconUrl}" alt="${data.weather[0].description}" />
        <div class="temp">${kelvinToCelsius(data.main.temp)}°C / ${kelvinToFahrenheit(data.main.temp)}°F</div>
        <div class="weather-info">${data.weather[0].description}</div>
        <div class="weather-info">Humidity: ${data.main.humidity}%</div>
        <div class="weather-info">Wind: ${data.wind.speed} m/s</div>
      `;
    }

    async function loadWeather() {
      container.innerHTML = '<p>Loading weather data...</p>';
      const data = await fetchWeather();
      displayWeather(data);
    }

    loadWeather();
  </script>
</body>
</html>
