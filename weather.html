<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather - The Baja Nomad</title>

  <!-- Primary Meta -->
  <meta name="description" content="Local weather and wind forecasts for La Paz, Baja California Sur." />
  <meta name="keywords" content="Baja, weather, La Paz, wind" />
  <meta name="author" content="The Baja Nomad" />

  <!-- Open Graph -->
  <meta property="og:title" content="Weather - The Baja Nomad" />
  <meta property="og:description" content="Local weather and wind forecasts for La Paz, Baja California Sur." />
  <meta property="og:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://the-baja-nomad.vercel.app/weather.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Weather - The Baja Nomad" />
  <meta name="twitter:description" content="Local weather and wind forecasts for La Paz, Baja California Sur." />
  <meta name="twitter:image" content="https://the-baja-nomad.vercel.app/social-preview.png" />

  <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .content { overflow-y: auto; }

    .neon-widget-wrapper {
      margin-top: 2rem;
      width: 100%;
      overflow: hidden;
    }

    iframe.forecast {
      width: 100%;
      height: 170px;
      border: 0;
      border-radius: 8px;
      background-color: black;
    }

    iframe.map {
      width: 100%;
      height: 450px;
      border: 0;
      border-radius: 8px;
      background-color: black;
    }

    @media (max-width: 768px) {
      iframe.map { height: 320px; }
    }

    @media (orientation: landscape) {
      header { font-size: 1.8rem; margin-bottom: 0.5rem; }
      iframe.map { height: 260px; }
    }
  </style>
</head>

<body>
  <canvas id="matrix"></canvas>

  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Local Weather</header>

    <div class="neon-widget-wrapper">
      <iframe
        class="forecast"
        src="https://embed.windy.com/embed2.html?lat=23.446&lon=-110.223&detailLat=23.446&detailLon=-110.223&width=100%&height=170&zoom=8&level=surface&overlay=wind&menu=&message=false&marker=false&calendar=7&pressure=false&type=forecast&location=coordinates&detail=true&metricWind=default&metricTemp=%C2%B0F&radarRange=-1">
      </iframe>
    </div>

    <div class="neon-widget-wrapper">
      <iframe
        class="map"
        src="https://embed.windy.com/embed2.html?lat=23.446&lon=-110.261&detailLat=23.446&detailLon=-110.261&width=100%&height=450&zoom=10&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&type=map&location=coordinates&detail=&metricWind=kt&metricTemp=%C2%B0F&radarRange=-1"
        allowfullscreen
        loading="lazy">
      </iframe>
    </div>
  </div>

  <script src="matrix.js"></script>
</body>
</html>
