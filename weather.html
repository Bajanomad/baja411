<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
      position: relative;
    }
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      will-change: transform;
      transform: translateZ(0);
    }
    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14;
      animation: flicker 3s infinite alternate;
    }
    @keyframes flicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      75% {
        text-shadow: none;
        opacity: 0.6;
      }
    }
    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      box-shadow: 0 0 8px #39ff14aa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      z-index: 999;
      text-decoration: none;
    }
    .back-arrow:hover {
      transform: scale(1.1);
      border-color: #2ecc40;
      box-shadow: 0 0 16px #2ecc40cc;
    }
    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }
    .neon-widget-wrapper {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #39ff14;
      box-shadow: 0 0 10px #39ff14aa, 0 0 20px #39ff14aa;
      border-radius: 12px;
      padding: 1rem;
      margin-top: 2rem;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      z-index: 3;
    }
    iframe.forecast {
      width: 100%;
      height: 170px;
      border: 0;
      border-radius: 8px;
      background-color: black;
    }
    iframe.map {
      width: 100%;
      height: 450px;
      border: 0;
      border-radius: 8px;
      background-color: black;
    }
    @media (max-width: 768px) {
      iframe.map {
        height: 320px;
      }
    }
  </style>
</head>
<body>

  <!-- Matrix Rain Background -->
  <canvas id="matrix"></canvas>

  <!-- Back Arrow -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <!-- Content Area -->
  <div class="content">
    <header>Local Weather</header>

    <!-- Forecast Widget (7 Day) -->
    <div class="neon-widget-wrapper">
      <iframe
        class="forecast"
        src="https://embed.windy.com/embed2.html?lat=23.446&lon=-110.223&detailLat=23.446&detailLon=-110.223&width=100%&height=170&zoom=8&level=surface&overlay=wind&menu=&message=false&marker=false&calendar=7&pressure=false&type=forecast&location=coordinates&detail=true&metricWind=default&metricTemp=default&radarRange=-1">
      </iframe>
    </div>

    <!-- Wind Map Widget -->
    <div class="neon-widget-wrapper">
      <iframe
        class="map"
        src="https://embed.windy.com/embed2.html?lat=23.446&lon=-110.261&detailLat=23.446&detailLon=-110.261&width=100%&height=450&zoom=10&level=surface&overlay=wind&product=ecmwf&menu=&message=&marker=&calendar=now&type=map&location=coordinates&detail=&metricWind=kt&metricTemp=%C2%B0C&radarRange=-1"
        allowfullscreen
        loading="lazy">
      </iframe>
    </div>
  </div>

  <!-- Matrix Rain Script -->
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    let columns = Math.floor(canvas.width / fontSize);
    let drops = Array(columns).fill(1);
    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    setInterval(draw, 35);
  </script>

</body>
</html>
