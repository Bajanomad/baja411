<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reviews - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
      padding: 2rem;
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px #39ff14;
      text-align: center;
      animation: flicker 2.5s infinite alternate;
    }

    p.description {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      text-align: center;
      color: #2ecc40cc;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    input, textarea, select {
      padding: 0.75rem;
      background: black;
      border: 2px solid #39ff14;
      color: #39ff14;
      font-size: 1rem;
      border-radius: 4px;
      font-family: 'Share Tech Mono', monospace;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2ecc40;
      box-shadow: 0 0 10px #2ecc40aa;
    }

    button {
      background: #39ff14;
      color: black;
      padding: 0.8rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      box-shadow: 0 0 10px #39ff14bb;
      transition: all 0.2s ease-in-out;
    }

    button:hover {
      background: #2ecc40;
      box-shadow: 0 0 20px #2ecc40cc;
    }

    /* Back arrow */
    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      z-index: 999;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
    }

    .back-arrow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px #2ecc40cc;
      border-color: #2ecc40;
    }

    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }

    @keyframes flicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      70% {
        text-shadow: none;
        opacity: 0.6;
      }
    }
  </style>
</head>
<body>

  <!-- Back Arrow -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <div class="content">
    <header>Leave a Review</header>
    <p class="description">Tell it like it is. We love the praise, but we can take a punch too.</p>

    <form action="https://formspree.io/f/xanbypng" method="POST">
      <!-- Name -->
      <label for="name">Name</label>
      <input type="text" name="name" id="name" placeholder="Your name..." required />

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" name="_replyto" id="email" placeholder="you@example.com" required />

      <!-- Rating -->
      <label for="rating">Rating</label>
      <select name="rating" id="rating" required>
        <option value="">Select one</option>
        <option>⭐️⭐️⭐️⭐️⭐️ - Flawless</option>
        <option>⭐️⭐️⭐️⭐️ - Damn good</option>
        <option>⭐️⭐️⭐️ - Solid</option>
        <option>⭐️⭐️ - Meh</option>
        <option>⭐️ - Total dumpster fire</option>
      </select>

      <!-- Message -->
      <label for="message">Message</label>
      <textarea name="message" id="message" rows="5" placeholder="Let it rip..." required></textarea>

      <!-- Submit -->
      <button type="submit">Submit Review</button>
    </form>
  </div>
</body>
</html>
