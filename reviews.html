<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reviews - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Back Arrow */
    .back-arrow {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      z-index: 999;
      background: black;
      border: 2px solid #39ff14;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 8px #39ff14aa;
      transition: all 0.2s ease-in-out;
      text-decoration: none;
    }

    .back-arrow:hover {
      transform: scale(1.1);
      border-color: #2ecc40;
      box-shadow: 0 0 16px #2ecc40cc;
    }

    .back-arrow img {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px #39ff14);
    }

    .content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 1;
      background: rgba(0, 0, 0, 0.75);
      padding: 5rem 2rem 2rem 2rem; /* padding-top bumped to avoid back arrow */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1rem;
      text-align: center;
      text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
    }

    p.description {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      text-align: center;
      color: #2ecc40cc;
      text-shadow: 0 0 5px #2ecc40aa;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      width: 100%;
      max-width: 700px;
    }

    input, textarea, select {
      padding: 0.75rem;
      background: black;
      border: 2px solid #39ff14;
      color: #39ff14;
      font-size: 1rem;
      border-radius: 4px;
      font-family: 'Share Tech Mono', monospace;
      text-shadow: 0 0 5px #39ff14aa;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2ecc40;
      box-shadow: 0 0 10px #2ecc40aa;
    }

    button {
      background: #39ff14;
      color: black;
      padding: 0.8rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      box-shadow: 0 0 10px #39ff14bb;
      transition: all 0.2s ease-in-out;
    }

    button:hover {
      background: #2ecc40;
      box-shadow: 0 0 20px #2ecc40cc;
    }
  </style>
</head>
<body>

  <!-- Matrix Canvas -->
  <canvas id="matrix"></canvas>

  <!-- Back Arrow -->
  <a href="index.html" title="Back to Main" class="back-arrow">
    <img src="https://img.icons8.com/ios-filled/50/39ff14/left.png" alt="Back" />
  </a>

  <!-- Content Wrapper -->
  <div class="content">
    <header>Leave a Review</header>
    <p class="description">Tell it like it is. We love the praise, but we can take a punch too.</p>

    <form action="https://formspree.io/f/xanbypng" method="POST">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" placeholder="Your name..." required />

      <label for="email">Email</label>
      <input type="email" name="_replyto" id="email" placeholder="you@example.com" required />

      <label for="rating">Rating</label>
      <select name="rating" id="rating" required>
        <option value="">Select one</option>
        <option>⭐️⭐️⭐️⭐️⭐️ - Flawless</option>
        <option>⭐️⭐️⭐️⭐️ - Damn good</option>
        <option>⭐️⭐️⭐️ - Solid</option>
        <option>⭐️⭐️ - Meh</option>
        <option>⭐️ - Total dumpster fire</option>
      </select>

      <label for="message">Message</label>
      <textarea name="message" id="message" rows="5" placeholder="Let it rip..." required></textarea>

      <button type="submit">Submit Review</button>
    </form>
  </div>

  <!-- Matrix Script -->
  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "アァイィウヴエカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
