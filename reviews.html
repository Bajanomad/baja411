<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reviews - The Baja Nomad</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: black;
      font-family: 'Share Tech Mono', monospace;
      color: #39ff14;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .content {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Title glow effect */
    header {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px #39ff14;
      text-align: center;
      animation: flicker 2.5s infinite alternate;
    }

    /* Subtitle under header */
    p.description {
      font-size: 1.25rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      text-align: center;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      color: #2ecc40cc;
    }

    /* Google Form embed frame */
    iframe.review-form {
      display: block;
      margin: 0 auto 2rem;
      border: none;
      width: 100%;
      min-height: 900px;
      max-width: 100%;
      box-shadow: 0 0 20px #39ff14aa;
      border-radius: 8px;
      background: black;
    }

    @keyframes flicker {
      0%, 100% {
        text-shadow: 0 0 8px #39ff14, 0 0 20px #39ff14, 0 0 30px #39ff14cc;
        opacity: 1;
      }
      50% {
        text-shadow: 0 0 4px #2ecc40, 0 0 10px #2ecc40aa;
        opacity: 0.8;
      }
      70% {
        text-shadow: none;
        opacity: 0.6;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <header>Reviews</header>
    <p class="description">
      Drop your thoughts—compliments, complaints, or pure chaos. We read it all.
    </p>

    <!-- 👇 Embedded Google Form with no extra bullshit -->
    <iframe
      class="review-form"
      src="https://docs.google.com/forms/d/e/1FAIpQLScRioIJdZa-N53VBqu7lwsGQlPv_Mumufis3UEwq0-Oj7d1fg/viewform?embedded=true"
      title="Submit Your Review"
      loading="lazy"
    >
      Loading…
    </iframe>
  </div>
</body>
</html>
